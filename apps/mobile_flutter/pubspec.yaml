  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.7+1
  flutter_riverpod: ^2.6.1
