name: auction_market_mobile
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.7+1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  fl_chart: ^0.69.2
  intl: ^0.20.2
  local_auth: ^2.3.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  event_bus: ^2.0.1
  lottie: ^3.3.2
  fluttertoast: ^8.2.6
  collection: ^1.19.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  shared_preferences: ^2.5.4
  build_runner: ^2.4.12
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/translations/
    - assets/lotties/
