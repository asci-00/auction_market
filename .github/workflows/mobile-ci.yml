name: Mobile CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/mobile_flutter/**"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/mobile_flutter/**"
      - ".github/workflows/mobile-ci.yml"

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
