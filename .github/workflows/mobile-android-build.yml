name: Mobile Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/mobile_flutter/**"
      - ".github/workflows/mobile-android-build.yml"

permissions:
  contents: read

concurrency:
  group: mobile-android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-debug-apk
          path: apps/mobile_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
