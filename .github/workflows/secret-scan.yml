name: Secret Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan working tree for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          set -euo pipefail

          version="8.24.3"
          archive="/tmp/gitleaks.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"

          if curl -sSfL \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 3 \
            --connect-timeout 10 \
            --max-time 180 \
            "$url" \
            -o "$archive"; then
            tar -xzf "$archive" gitleaks
            sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          else
            echo "Release download failed, falling back to go install."
            sudo apt-get update
            sudo apt-get install -y golang-go
            GOBIN=/tmp/go-bin go install "github.com/gitleaks/gitleaks/v8@v${version}"
            sudo install -m 0755 /tmp/go-bin/gitleaks /usr/local/bin/gitleaks
          fi

          gitleaks version

      - name: Prepare scan workspace
        run: |
          rm -rf /tmp/secret-scan
          mkdir -p /tmp/secret-scan
          rsync -a ./ /tmp/secret-scan/ \
            --exclude '.git/' \
            --exclude 'README.md' \
            --exclude 'apps/mobile_flutter/lib/features/auth/data/dev_quick_account.dart' \
            --exclude 'backend/functions/scripts/seed_data.ts' \
            --exclude 'apps/mobile_flutter/android/app/google-services.json' \
            --exclude 'apps/mobile_flutter/ios/Runner/GoogleService-Info.plist' \
            --exclude 'apps/mobile_flutter/ios/Podfile.lock'

      - name: Run Gitleaks on working tree
        run: gitleaks detect --no-git --source /tmp/secret-scan --redact --report-format json --report-path /tmp/gitleaks-report.json

      - name: Upload Gitleaks report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: /tmp/gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 7
