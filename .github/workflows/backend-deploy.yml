name: Backend Deploy

on:
  workflow_run:
    workflows:
      - Backend CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: backend-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-firebase:
    name: Deploy Firebase backend
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.run_attempt == 1
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify workflow run matches current main tip
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const { data: mainRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "heads/main",
            });
            const mainSha = mainRef.object.sha;
            if (headSha !== mainSha) {
              core.setFailed(
                `Skip deploy: workflow_run head_sha (${headSha}) is stale vs current main (${mainSha}).`,
              );
            }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy Firebase Functions and rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --non-interactive \
            --only functions,firestore:rules,firestore:indexes,storage
        working-directory: ${{ github.workspace }}
