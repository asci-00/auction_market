name: Mobile iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/mobile_flutter/**"
      - ".github/workflows/mobile-ios-build.yml"

permissions:
  contents: read

concurrency:
  group: mobile-ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator-app:
    name: Build iOS Simulator App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS simulator app
        run: flutter build ios --simulator --debug --no-codesign

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-simulator-app
          path: apps/mobile_flutter/build/ios/iphonesimulator/Runner.app
          if-no-files-found: error
          retention-days: 7
